<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jelajahi Topik Lain - Grid & Pop-up Modal</title>
    <style>
        /* ==================== 1. RESET & DASAR ==================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f9f9f9;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .section-container {
            max-width: 1000px;
            width: 100%;
        }

        .section-title {
            font-size: 2rem;
            color: #3b7a30; /* Warna hijau sesuai tema */
            margin-bottom: 30px;
            font-weight: 600;
        }

        /* ==================== 2. GRID CARD ARTIKEL ==================== */
        .article-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
        }

        .card {
            background-color: #d9d9d9; /* Warna abu-abu latar card sesuai gambar */
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border: 1px solid #ccc;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .card-img-wrapper {
            width: 100%;
            height: 180px;
            overflow: hidden;
            background-color: #eee;
        }

        .card-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex-grow: 1;
        }

        .card-content h3 {
            font-size: 1.1rem;
            color: #000000;
            font-weight: 700;
        }

        .card-content p {
            font-size: 0.95rem;
            color: #333333;
            line-height: 1.5;
        }

        /* ==================== 3. POP-UP MODAL STYLING ==================== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6); /* Efek gelap di belakang pop-up */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        /* Kelas aktif untuk memunculkan modal via JS */
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-box {
            background-color: #ffffff;
            width: 90%;
            max-width: 550px;
            border-radius: 24px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            transform: scale(0.8);
            transition: transform 0.3s ease;
            padding-bottom: 25px;
        }

        .modal-overlay.active .modal-box {
            transform: scale(1);
        }

        .modal-close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 2rem;
            color: #ffffff;
            background: rgba(0, 0, 0, 0.4);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: background 0.2s;
        }

        .modal-close-btn:hover {
            background: rgba(0, 0, 0, 0.7);
        }

        .modal-img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .modal-body {
            padding: 25px;
        }

        .modal-body h2 {
            font-size: 1.6rem;
            color: #3b7a30;
            margin-bottom: 15px;
        }

        .modal-body p {
            font-size: 1rem;
            color: #444;
            line-height: 1.6;
        }

        /* ==================== 4. RESPONSIVE (HP & TABLET) ==================== */
        @media (max-width: 900px) {
            .article-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .article-grid {
                grid-template-columns: 1fr;
            }
            .section-title {
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <div class="section-container">
        <h2 class="section-title">Jelajahi Topik Lain</h2>

        <div class="article-grid" id="gridContainer">
            </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box">
            <button class="modal-close-btn" id="closeBtn">&times;</button>
            <img src="" alt="Gambar Artikel" class="modal-img" id="modalImg">
            <div class="modal-body">
                <h2 id="modalTitle">Judul Artikel</h2>
                <p id="modalDesc">Penjelasan lengkap artikel...</p>
            </div>
        </div>
    </div>

    <script>
        // 1. Data Konten Artikel (Ubah isi teks/gambar di sini secara terpusat)
        const articlesData = [
            {
                title: "Fisik & Pubertas",
                shortDesc: "edukasi perubahan biologis dan anatomi tubuh yang terjadi selama masa transisi remaja...",
                longDesc: "Edukasi perubahan biologis dan anatomi tubuh yang terjadi selama masa transisi remaja secara mendalam. Topik ini membahas perubahan hormon, lonjakan pertumbuhan tinggi badan, perkembangan organ reproduksi, serta cara menyikapi perubahan fisik tersebut secara positif tanpa rasa cemas.",
                image: "https://via.placeholder.com/400x250/bce2b7/333?text=Fisik+dan+Pubertas"
            },
            {
                title: "Kesehatan Mental & Emosi",
                shortDesc: "menjaga kesejahteraan psikologis bagi remaja...",
                longDesc: "Menjaga kesejahteraan psikologis bagi remaja merupakan fondasi utama kebahagiaan. Di sini dibahas mengenai cara mengelola stres saat ujian, memahami perubahan suasana hati (mood swings), mengenali tanda depresi dini, dan bagaimana cara berdiskusi dengan orang tua atau profesional jika membutuhkan bantuan emosional.",
                image: "https://via.placeholder.com/400x250/b7cee2/333?text=Mental+dan+Emosi"
            },
            {
                title: "Nutrisi & Kebugaran",
                shortDesc: "pembentukan gaya hidup sehat melalui asupan nutrisi yang tepat dan aktivitas fisik yang teratur...",
                longDesc: "Pembentukan gaya hidup sehat melalui asupan nutrisi yang tepat dan aktivitas fisik yang teratur. Temukan panduan porsi makan seimbang (Isi Piringku), pentingnya hidrasi cairan tubuh, serta rekomendasi olahraga harian sederhana yang bisa dilakukan di rumah demi menjaga stamina dan kebugaran tubuh.",
                image: "https://via.placeholder.com/400x250/e2b7b7/333?text=Nutrisi+dan+Kebugaran"
            },
            {
                title: "Kesehatan Digital",
                shortDesc: "penggunaan teknologi dengan kesehatan holistik remaja...",
                longDesc: "Menyelaraskan penggunaan teknologi harian dengan kesehatan holistik remaja. Bagian ini mengulas cara mendeteksi kecanduan gadget (screen time berlebih), gangguan pola tidur akibat paparan radiasi layar di malam hari, serta tips melakukan digital detox secara berkala.",
                image: "https://via.placeholder.com/400x250/e2dfb7/333?text=Kesehatan+Digital"
            },
            {
                title: "Literasi Digital Sehat",
                shortDesc: "Membantu remaja menggunakan media sosial dan teknologi secara bijak...",
                longDesc: "Membantu remaja menggunakan media sosial dan teknologi secara bijak. Berfokus pada edukasi etika berkomunikasi di internet, cara menghindari bahaya cyberbullying, menyaring berita hoax, serta taktik menjaga kerahasiaan dan keamanan data pribadi di berbagai platform media sosial.",
                image: "https://via.placeholder.com/400x250/e2b7dc/333?text=Literasi+Digital+Sehat"
            },
            {
                title: "Nutrisi & Pola Makan",
                shortDesc: "pentingnya asupan gizi yang tepat untuk mendukung pertumbuhan remaja, meningkatkan energi...",
                longDesc: "Pentingnya asupan gizi makro dan mikro yang tepat untuk mendukung akselerasi pertumbuhan remaja, memaksimalkan perkembangan kognitif otak, serta meningkatkan cadangan energi harian agar fokus belajar tetap terjaga sepanjang hari tanpa mudah lelah.",
                image: "https://via.placeholder.com/400x250/b7e2da/333?text=Nutrisi+dan+Pola+Makan"
            }
        ];

        const gridContainer = document.getElementById('gridContainer');
        const modalOverlay = document.getElementById('modalOverlay');
        const closeBtn = document.getElementById('closeBtn');
        
        const modalImg = document.getElementById('modalImg');
        const modalTitle = document.getElementById('modalTitle');
        const modalDesc = document.getElementById('modalDesc');

        // 2. Fungsi Membuat Susunan Card Secara Otomatis
        function renderCards() {
            articlesData.forEach((article, index) => {
                // Buat elemen card
                const card = document.createElement('div');
                card.classList.add('card');
                
                // Masukkan HTML card
                card.innerHTML = `
                    <div class="card-img-wrapper">
                        <img src="${article.image}" alt="${article.title}">
                    </div>
                    <div class="card-content">
                        <h3>${article.title}</h3>
                        <p>${article.shortDesc}</p>
                    </div>
                `;

                // Pasang event klik pada masing-masing card untuk membuka pop-up
                card.addEventListener('click', () => openModal(index));
                
                // Tampilkan ke container grid
                gridContainer.appendChild(card);
            });
        }

        // 3. Fungsi Membuka Pop-up & Mengisi Konten
        function openModal(index) {
            const data = articlesData[index];
            modalImg.src = data.image;
            modalTitle.textContent = data.title;
            modalDesc.textContent = data.longDesc; // Menampilkan deskripsi lengkap

            modalOverlay.classList.add('active'); // Memunculkan pop-up
        }

        // 4. Fungsi Menutup Pop-up
        function closeModal() {
            modalOverlay.classList.remove('active');
        }

        // Event listener untuk tombol silang & klik di area luar pop-up kotak
        closeBtn.addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) {
                closeModal();
            }
        });

        // Jalankan fungsi render saat pertama kali halaman dimuat
        renderCards();
    </script>
</body>
</html>
