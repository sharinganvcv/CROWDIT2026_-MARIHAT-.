<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Mitos vs Fakta Kesehatan</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Background Utama Layar */
        body {
            background-color: #f0f7f4;
            min-height: 100vh;
            padding: 40px;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Progress Bar Tetap di Paling Atas */
        .progress-container {
            display: flex;
            gap: 10px;
            margin-bottom: 50px;
            width: 100%;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }

        .progress-bar {
            height: 10px;
            flex: 1;
            background-color: #e0e0e0;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }

        .progress-bar.active {
            background-color: #4caf50;
        }

        /* WRAPPER SLIDE UTAMA - Lebar 300% untuk menampung 3 halaman */
        .slide-wrapper {
            display: flex;
            width: 300%; 
            max-width: 4200px;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            flex: 1;
        }

        /* Pembagian Setiap Halaman (Masing-masing 1/3 dari 300%) */
        .slide-page {
            width: 33.333%; 
            flex-shrink: 0;
            transition: opacity 0.4s ease-in-out;
            display: flex;
            flex-direction: column;
            padding: 0 20px;
        }

        /* State Awal Opacity Halaman */
        .question-page { opacity: 1; }
        .meme-page { opacity: 0; pointer-events: none; }
        .explanation-page { opacity: 0; pointer-events: none; }

        /* ========================================== */
        /* LOGIKA TRANSISI FIXED SLIDE + FADE        */
        /* ========================================== */
        .slide-wrapper.show-meme {
            transform: translateX(-33.333%);
        }
        .slide-wrapper.show-meme .question-page { opacity: 0; }
        .slide-wrapper.show-meme .meme-page { opacity: 1; pointer-events: auto; }

        .slide-wrapper.show-explanation {
            transform: translateX(-66.666%);
        }
        .slide-wrapper.show-explanation .question-page { opacity: 0; }
        .slide-wrapper.show-explanation .meme-page { opacity: 0; }
        .slide-wrapper.show-explanation .explanation-page { opacity: 1; pointer-events: auto; }


        /* ==================== HALAMAN 1: SOAL ==================== */
        .quiz-header {
            font-size: 22px;
            color: #666;
            margin-bottom: 20px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .question {
            font-size: 48px; 
            font-weight: 800;
            color: #1a1a1a;
            margin-bottom: 60px;
            line-height: 1.3;
            letter-spacing: -1px;
            max-width: 1300px;
        }

        /* Dua Kolom Sejajar khusus untuk FAKTA dan MITOS */
        .options-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            max-width: 1400px;
            width: 100%;
        }

        @media (max-width: 768px) {
            .options-container {
                grid-template-columns: 1fr; /* Jadi vertikal kalau di HP */
            }
        }

        .option-btn {
            border: none;
            border-radius: 30px;
            padding: 35px; 
            font-size: 32px;    
            font-weight: 900;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 10px 25px rgba(0,0,0,0.06);
            color: white;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Desain Tombol Fakta (Hijau) */
        .btn-fakta {
            background-color: #2e7d32;
        }
        .btn-fakta:hover:not(:disabled) {
            background-color: #1b5e20;
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(46, 125, 50, 0.3);
        }

        /* Desain Tombol Mitos (Merah) */
        .btn-mitos {
            background-color: #d32f2f;
        }
        .btn-mitos:hover:not(:disabled) {
            background-color: #c62828;
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(211, 47, 47, 0.3);
        }

        /* Style Kunci Pas Jawaban Diproses */
        .option-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Animasi Hasil Benar (Pulse Hijau Terang) */
        .option-btn.correct-active {
            background-color: #4caf50 !important;
            opacity: 1 !important;
            animation: pulseCorrect 0.5s ease-in-out infinite alternate;
        }

        @keyframes pulseCorrect {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.7); }
            100% { transform: scale(1.04); box-shadow: 0 0 25px 15px rgba(76, 175, 80, 0); }
        }

        /* Animasi Hasil Salah (Shake Merah Terang) */
        .option-btn.wrong-active {
            background-color: #ff5252 !important;
            opacity: 1 !important;
            animation: shakeWrong 0.4s ease-in-out;
        }

        @keyframes shakeWrong {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-12px); }
            40%, 80% { transform: translateX(12px); }
        }


        /* ==================== HALAMAN 2: MEME ONLY ==================== */
        .meme-status-text {
            font-size: 54px;
            font-weight: 900;
            margin-bottom: 30px;
            text-align: center;
        }
        .text-correct { color: #4caf50; }
        .text-wrong { color: #f44336; }

        .meme-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
        }

        .meme-sticker {
            width: 380px;
            height: 380px;
            object-fit: cover; 
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }

        .meme-timer-text {
            text-align: center;
            font-size: 20px;
            color: #666;
            font-style: italic;
        }


        /* ==================== HALAMAN 3: PENJELASAN ==================== */
        .explanation-title {
            font-weight: 800;
            font-size: 42px;
            color: #1a1a1a;
            margin-bottom: 30px;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
            width: 100%;
        }

        .explanation-text {
            font-size: 26px;
            color: #222;
            line-height: 1.7;
            background: #ffffff;
            padding: 45px;
            border-radius: 24px;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        }

        .footer-controls {
            display: flex;
            justify-content: flex-end; 
            max-width: 1200px;
            width: 100%;
            margin-left: auto;
            margin-right: auto;
            margin-top: 40px;
        }

        .next-btn {
            background-color: #2e7d32;
            color: white;
            border: none;
            padding: 20px 60px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 22px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 8px 15px rgba(46, 125, 50, 0.2);
        }

        .next-btn:hover {
            background-color: #1b5e20;
            transform: scale(1.05);
        }


        /* ==================== SCREEN SKOR AKHIR ==================== */
        .result-screen {
            text-align: center;
            display: none;
            margin-top: auto;
            margin-bottom: auto;
        }

        .result-screen h2 {
            font-size: 54px;
            margin-bottom: 20px;
        }

        .result-score {
            font-size: 80px;
            font-weight: 900;
            color: #4caf50;
            margin: 40px 0;
        }

        .result-screen p {
            font-size: 26px;
            color: #444;
        }

        .restart-btn {
            background-color: #4caf50;
            color: white;
            border: none;
            padding: 18px 50px;
            border-radius: 40px;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 40px;
            transition: transform 0.2s;
        }
        
        .restart-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="progress-container" id="progress-container"></div>
    
    <div id="quiz-screen" style="flex: 1; display: flex; flex-direction: column;">
        <div class="slide-wrapper" id="slide-wrapper">
            
            <div class="slide-page question-page" id="question-page">
                <div class="quiz-header" id="quiz-header">Kategori Kuis</div>
                <div class="question" id="question-text">Loading Soal...</div>
                <div class="options-container" id="options-container">
                    </div>
            </div>

            <div class="slide-page meme-page" id="meme-page">
                <div class="meme-status-text" id="meme-status-text">KERJA BAGUS! 👍</div>
                <div class="meme-wrapper">
                    <img id="meme-sticker" class="meme-sticker" src="" alt="Meme Status">
                </div>
                <div class="meme-timer-text">Membuka penjelasan ilmiah...</div>
            </div>

            <div class="slide-page explanation-page" id="explanation-page">
                <div class="explanation-title">💡 Penjelasan Ilmiah (Berdasarkan Riset):</div>
                <p class="explanation-text" id="explanation-text">Detail penjelasan riset...</p>
                <div class="footer-controls">
                    <button class="next-btn" id="next-btn" onclick="nextQuestion()">Next kuis (4s)</button>
                </div>
            </div>

        </div>
    </div>

    <div class="result-screen" id="result-screen">
        <h2>Kuis Selesai! 🎉</h2>
        <div class="result-score" id="final-score">0 / 5</div>
        <p id="result-message">Hebat! Tetap kritis menyaring info kesehatan ya!</p>
        <button class="restart-btn" onclick="restartQuiz()">Main Lagi</button>
    </div>

<script>
    // DATABASE BARU: Mitos vs Fakta Berbasis Riset Ilmiah
    const quizData = [
        {
            category: "Kesehatan Kulit & Pola Makan",
            question: "“Makan cokelat dan makanan manis pasti menjadi penyebab utama munculnya jerawat.”",
            options: ["FAKTA", "MITOS"],
            correct: 1, // Indeks 1 adalah MITOS
            explanation: "Menurut American Academy of Dermatology (AAD), cokelat tidak secara langsung menyebabkan jerawat. Penyebab utamanya adalah makanan dengan indeks glikemik tinggi (seperti gula berlebih) yang memicu lonjakan insulin dan produksi minyak di kulit, serta faktor genetik dan hormon saat pubertas."
        },
        {
            category: "Tren Diet & Kesehatan Fisik",
            question: "“Minum air lemon hangat di pagi hari dapat membakar lemak tubuh secara drastis.”",
            options: ["FAKTA", "MITOS"],
            correct: 1, // Indeks 1 adalah MITOS
            explanation: "Studi dari Harvard Medical School menyatakan tidak ada bukti ilmiah bahwa air lemon dapat membakar lemak atau mengecilkan lingkar pinggang. Air lemon baik untuk hidrasi dan sumber Vitamin C, namun penurunan berat badan hanya terjadi melalui defisit kalori dan olahraga teratur."
        },
        {
            category: "Kebiasaan Tidur & Akhir Pekan",
            question: "“Tidur seharian di hari Sabtu dan Minggu dapat menggantikan kekurangan tidur (sleep debt) akibat begadang selama hari sekolah.”",
            options: ["FAKTA", "MITOS"],
            correct: 1, // Indeks 1 adalah MITOS
            explanation: "Riset dari Current Biology (2019) menunjukkan bahwa 'balas dendam jam tidur' di akhir pekan tidak memulihkan gangguan metabolik dan fokus akibat kurang tidur kronis. Kebiasaan ini justru mengacaukan jam biologis tubuh (ritme sirkadian), membuat Anda lebih lemas di hari Senin (Monday Blues)."
        },
        {
            category: "Kesehatan Mental & Emosi",
            question: "“Seseorang yang mengalami gangguan kecemasan (anxiety) hanya perlu 'menenangkan pikiran' atau 'kurang rekreasi' agar bisa sembuh.”",
            options: ["FAKTA", "MITOS"],
            correct: 1, // Indeks 1 adalah MITOS
            explanation: "Berdasarkan laporan World Health Organization (WHO), gangguan kecemasan adalah kondisi medis nyata yang melibatkan ketidakseimbangan neurotransmiter di otak, faktor genetik, dan trauma psikologis. Kondisi ini membutuhkan validasi medis, terapi profesional (seperti CBT), dan bukan sekadar urusan 'kurang hiburan'."
        },
        {
            category: "Penggunaan Gadget & Kesehatan Mata",
            question: "“Paparan blue light dari layar smartphone di malam hari dapat mengganggu siklus tidur dan menurunkan kualitas istirahat.”",
            options: ["FAKTA", "MITOS"],
            correct: 0, // Indeks 0 adalah FAKTA
            explanation: "Penelitian dari National Sleep Foundation membuktikan bahwa paparan cahaya biru dari gadget menghambat produksi hormon melatonin (hormon pemicu rasa kantuk). Akibatnya, otak tetap mengira situasi masih siang hari, sehingga Anda kesulitan tertidur dan mengalami penurunan kualitas tidur fase REM."
        }
    ];

    // DAFTAR STIKER RANDOM (Silakan ganti nama file lokal buatanmu di sini, bray)
    const memes = {
        correct: [
            "assets/memes/benar.png",
            "assets/memes/benar1.png",
            "assets/memes/benar2.png"
        ], 
        wrong: [
            "assets/memes/salah.png",
            "assets/memes/salah1.png",
            "assets/memes/salah2.png"
        ]    
    };

    let currentQuestionIndex = 0;
    let score = 0;
    let autoNextTimeout = null;
    let countdownInterval = null;

    function initQuiz() {
        createProgressBar();
        loadQuestion();
    }

    function createProgressBar() {
        const container = document.getElementById('progress-container');
        container.innerHTML = '';
        for (let i = 0; i < quizData.length; i++) {
            const bar = document.createElement('div');
            bar.classList.add('progress-bar');
            if (i === 0) bar.classList.add('active');
            container.appendChild(bar);
        }
    }

    function updateProgressBar() {
        const bars = document.querySelectorAll('.progress-bar');
        bars.forEach((bar, index) => {
            if (index <= currentQuestionIndex) {
                bar.classList.add('active');
            } else {
                bar.classList.remove('active');
            }
        });
    }

    function loadQuestion() {
        clearTimeout(autoNextTimeout);
        clearInterval(countdownInterval);

        const wrapper = document.getElementById('slide-wrapper');
        wrapper.classList.remove('show-meme', 'show-explanation');

        const currentQuestion = quizData[currentQuestionIndex];
        
        // Tampilkan kategori dan pertanyaan
        document.getElementById('quiz-header').innerText = `${currentQuestionIndex + 1} dari ${quizData.length} | ${currentQuestion.category}`;
        document.getElementById('question-text').innerText = currentQuestion.question;

        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';

        // Generate dua tombol interaktif raksasa
        currentQuestion.options.forEach((option, index) => {
            const button = document.createElement('button');
            button.classList.add('option-btn');
            
            // Beri warna bawaan CSS berdasarkan jenis teksnya
            if(option === "FAKTA") {
                button.classList.add('btn-fakta');
            } else {
                button.classList.add('btn-mitos');
            }
            
            button.innerText = option;
            button.onclick = () => checkAnswer(index, button);
            optionsContainer.appendChild(button);
        });

        updateProgressBar();
    }

    function checkAnswer(selectedIndex, selectedButton) {
        const currentQuestion = quizData[currentQuestionIndex];
        const allButtons = document.querySelectorAll('.option-btn');
        const wrapper = document.getElementById('slide-wrapper');

        allButtons.forEach(btn => btn.disabled = true);

        const isCorrect = selectedIndex === currentQuestion.correct;
        const memeStatusText = document.getElementById('meme-status-text');
        const memeSticker = document.getElementById('meme-sticker');

        if (isCorrect) {
            score++;
            selectedButton.classList.add('correct-active'); // Efek Pulse mengembang
            memeStatusText.innerText = "JAWABAN TEPAT! 🧠⚡";
            memeStatusText.className = "meme-status-text text-correct";
            
            const randomIndex = Math.floor(Math.random() * memes.correct.length);
            memeSticker.src = memes.correct[randomIndex];
        } else {
            selectedButton.classList.add('wrong-active'); // Efek Shake bergetar
            allButtons[currentQuestion.correct].classList.add('correct-active'); 
            memeStatusText.innerText = "KURANG TEPAT! 🥹❌";
            memeStatusText.className = "meme-status-text text-wrong";
            
            const randomIndex = Math.floor(Math.random() * memes.wrong.length);
            memeSticker.src = memes.wrong[randomIndex];
        }

        document.getElementById('explanation-text').innerText = currentQuestion.explanation;
        
        // Jeda 1 detik di halaman soal -> Masuk halaman meme (3 detik) -> Masuk penjelasan (4 detik auto-next)
        setTimeout(() => {
            wrapper.classList.add('show-meme');
            
            setTimeout(() => {
                wrapper.classList.remove('show-meme');
                wrapper.classList.add('show-explanation');

                startAutoNextTimer();

            }, 3000);
        }, 1000); 
    }

    function startAutoNextTimer() {
        let timeLeft = 4;
        const nextBtn = document.getElementById('next-btn');
        nextBtn.innerText = `Next kuis (${timeLeft}s)`;

        countdownInterval = setInterval(() => {
            timeLeft--;
            if (timeLeft > 0) {
                nextBtn.innerText = `Next kuis (${timeLeft}s)`;
            } else {
                clearInterval(countdownInterval);
            }
        }, 1000);

        autoNextTimeout = setTimeout(() => {
            nextQuestion();
        }, 4000);
    }

    function nextQuestion() {
        clearTimeout(autoNextTimeout);
        clearInterval(countdownInterval);

        const wrapper = document.getElementById('slide-wrapper');
        wrapper.classList.remove('show-explanation');
        
        setTimeout(() => {
            currentQuestionIndex++;
            if (currentQuestionIndex < quizData.length) {
                loadQuestion();
            } else {
                showResult();
            }
        }, 500);
    }

    function showResult() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        
        const finalScore = (score / quizData.length) * 100;
        document.getElementById('final-score').innerText = `${score} / ${quizData.length} (Skor: ${finalScore})`;
        
        const message = document.getElementById('result-message');
        if (finalScore >= 80) {
            message.innerText = "Gokil! Kamu kritis banget, ga gampang termakan mitos kesehatan! 😎🔥";
        } else if (finalScore >= 60) {
            message.innerText = "Keren! Pengetahuan kesehatanmu udah lumayan oke, yuk makin rajin baca riset! 👍🏃‍♂️";
        } else {
            message.innerText = "Banyak info kesehatan di luar sana yang ternyata cuma mitos, yuk semangat belajar lagi! 🍎";
        }
    }

    function restartQuiz() {
        currentQuestionIndex = 0;
        score = 0;
        document.getElementById('quiz-screen').style.display = 'flex';
        document.getElementById('result-screen').style.display = 'none';
        createProgressBar();
        loadQuestion();
    }

    window.onload = initQuiz;
</script>

</body>
</html>
